name: Auto Commit

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # ✅ REQUIRED

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4   # ✅ updated

      - name: Make changes
        run: |
          echo "update $(date)" >> log.txt

      - name: Commit and push
        run: |
          git config user.name "Co0lboy"
          git config user.email "pawarani002@gmail.com"

          git add .
          git commit -m "daily update" || echo "No changes"

          git push

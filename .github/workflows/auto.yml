name: Auto Commit

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - run: echo "update $(date)" >> log.txt

      - run: |
          git config user.name "Co0lboy"
          git config user.email "YOUR_REAL_EMAIL@gmail.com"
          git add .
          git commit -m "daily update" || echo "no changes"
          git pull origin main --rebase
          git push
